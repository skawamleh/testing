<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Pattern Lab</title>
<link rel="icon" href="data:,">
<style>
:root{--n:#06111f;--n2:#102844;--b:#3578b9;--c:#55c7d9;--g:#73c88e;--a:#f2b84b;--r:#ee6b73;--w:#fff;--m:#aebdd0;--line:rgba(255,255,255,.16)}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(140deg,#050b14,#0b1a2d 48%,#071522);color:var(--w)}button,input{font:inherit}button{cursor:pointer}.top{position:sticky;top:0;z-index:5;display:flex;justify-content:space-between;gap:18px;align-items:center;padding:20px clamp(16px,4vw,52px);background:rgba(6,17,31,.82);border-bottom:1px solid var(--line);backdrop-filter:blur(14px)}.brand{display:flex;gap:12px;align-items:center}.mark{width:44px;height:44px;border:1px solid rgba(255,255,255,.24);border-radius:8px;display:grid;place-items:center;color:var(--c)}.mark svg{width:28px;height:28px;fill:none;stroke:currentColor;stroke-width:2.2}.label,.eyebrow{margin:0 0 4px;color:rgba(255,255,255,.64);font-size:12px;text-transform:uppercase;letter-spacing:.1em;font-weight:900}.top h1{font-size:clamp(20px,3vw,30px);margin:0}.wrap{width:min(1140px,calc(100% - 28px));margin:auto;padding:clamp(22px,5vw,54px) 0 64px}.grid{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(300px,.9fr);gap:clamp(18px,4vw,38px)}.panel{border:1px solid var(--line);background:rgba(16,40,68,.76);border-radius:8px;box-shadow:0 24px 80px rgba(0,0,0,.3);padding:clamp(22px,4vw,38px)}.hero h2{font-size:clamp(44px,7vw,76px);line-height:.94;margin:0 0 20px;max-width:11ch}.copy{color:rgba(255,255,255,.78);font-size:18px;line-height:1.55}.rule{border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.07);border-radius:8px;padding:14px;margin:0 0 12px}.rule b{display:block;margin-bottom:5px}.rule span{color:rgba(255,255,255,.72)}label{font-size:13px;text-transform:uppercase;letter-spacing:.08em;font-weight:900;color:rgba(255,255,255,.76)}input{width:100%;margin:8px 0 14px;padding:14px 15px;border:1px solid rgba(255,255,255,.24);border-radius:8px;background:rgba(255,255,255,.08);color:#fff}.btn{border:0;border-radius:8px;padding:13px 16px;font-weight:900;background:linear-gradient(135deg,var(--c),var(--b));color:#06111f}.ghost{border:1px solid rgba(255,255,255,.24);border-radius:8px;background:rgba(255,255,255,.07);color:white;padding:11px 14px;font-weight:900}.progress{height:10px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--c),var(--g));transition:width .25s}.meta{display:flex;justify-content:space-between;gap:14px;color:rgba(255,255,255,.68);font-size:13px;text-transform:uppercase;letter-spacing:.08em;font-weight:900;margin-bottom:8px}.round h2{font-size:clamp(32px,5vw,54px);line-height:.98;margin:16px 0}.question{font-size:18px;font-weight:850}.choice{width:100%;text-align:left;margin:11px 0;padding:17px;border-radius:8px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.07);color:#fff}.choice:hover{border-color:rgba(85,199,217,.55);background:rgba(255,255,255,.1)}.choice b{display:block;font-size:17px;margin-bottom:6px}.choice span{color:rgba(255,255,255,.68)}.choice.correct{border-color:var(--g);background:rgba(115,200,142,.15)}.choice.miss{border-color:var(--a);background:rgba(242,184,75,.12)}.badge{display:inline-block;width:max-content;padding:8px 10px;border:1px solid rgba(85,199,217,.35);border-radius:8px;background:rgba(85,199,217,.12);font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:900}.score{font-size:clamp(54px,8vw,104px);line-height:.85;font-weight:950}.barrow{margin:13px 0}.barrow div:first-child{display:flex;justify-content:space-between;font-size:13px;color:rgba(255,255,255,.78);font-weight:850;margin-bottom:6px}.track{height:9px;border-radius:99px;background:rgba(255,255,255,.1);overflow:hidden}.smallfill{height:100%;background:linear-gradient(90deg,var(--b),var(--c))}.review{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);border-radius:8px;padding:12px;margin:10px 0}.dot{width:34px;height:34px;display:grid;place-items:center;border-radius:8px;background:rgba(255,255,255,.1);color:var(--g);font-weight:900}.share{position:fixed;inset:0;background:rgba(5,11,20,.74);display:none;place-items:center;padding:20px;z-index:10}.share.on{display:grid}.link{overflow-wrap:anywhere;border:1px solid rgba(255,255,255,.16);border-radius:8px;padding:12px;color:rgba(255,255,255,.75);margin:14px 0}.qr{display:grid;place-items:center;background:#fff;border-radius:8px;min-height:230px}.qr img{width:210px;height:210px}@media(max-width:820px){.grid{grid-template-columns:1fr}.top{align-items:flex-start}.hero h2{font-size:46px}.review{grid-template-columns:1fr}}@media(max-width:520px){.top{flex-direction:column}.top button{width:100%}.panel{padding:21px}.wrap{width:min(100% - 22px,1140px)}}
</style>
</head>
<body>
<header class="top"><div class="brand"><div class="mark"><svg viewBox="0 0 48 48"><path d="M8 34V14l16-8 16 8v20l-16 8-16-8Z"/><path d="M15 30V18l9-4 9 4v12l-9 4-9-4Z"/><path d="M24 14v20M15 18l18 12M33 18 15 30"/></svg></div><div><p class="label">Executive AI 101 Learning Game</p><h1>AI Pattern Lab</h1></div></div><button class="ghost" id="shareBtn">QR + Link</button></header>
<main id="root" class="wrap"></main>
<aside class="share" id="share"><div class="panel" style="width:min(460px,100%)"><div style="display:flex;justify-content:space-between;align-items:center;gap:12px"><h2 style="margin:0">Share Lab</h2><button class="ghost" id="close">Close</button></div><p class="copy">Open this URL on participants' phones. The QR uses the current page link.</p><div class="qr" id="qr"></div><div class="link" id="link"></div><button class="btn" id="copyLink">Copy Link</button></div></aside>
<script>
const cats=[['concept','Concept clarity'],['context','Context discipline'],['delegate','Delegation judgment'],['verify','Verification discipline'],['agency','Human accountability']];
const rounds=[
{t:'What Kind of AI?',slide:'Symbolic, generative, agentic',concept:'Do not say AI until you know which kind of AI you mean.',setup:'A global repair team wants a system that blocks a substitute part when known emissions rules say it cannot be used in that market.',q:'What is the right first pattern?',best:'Symbolic AI',talk:'Where do rules help us, and where do they become too brittle?',c:[['Symbolic AI','Known rule, known condition, known outcome.',3,{concept:3,context:1,delegate:1,verify:2,agency:1},'Correct. If the rule is explicit and stable, a rules engine or decision table is often better than asking a language model to improvise.'],['Generative AI','Useful for explaining the rule, not enforcing it.',1,{concept:1,context:1,delegate:0,verify:1,agency:0},'Partly useful, but not as the authority. GenAI can summarize and explain compliance logic, but the enforceable control should come from governed rules.'],['Agentic AI','Too much autonomy for a clear rule check.',0,{concept:0,context:0,delegate:0,verify:0,agency:0},'Too heavy for the first move. An agent may route exceptions later, but a known compliance rule does not need a worker in a loop.']]},
{t:'What Are LLMs Good At?',slide:'LLMs are pattern engines, not truth machines',concept:'LLMs are strong at language, structure, synthesis, and comparison.',setup:'A customer escalation includes service notes, email history, warranty context, part availability, and engineering comments. The leader wants a clear issue brief by 2 PM.',q:'What should the model do first?',best:'Structure the evidence',talk:'What would make this output trustworthy enough for a leader to use?',c:[['Structure the evidence','Extract facts, conflicts, gaps, and likely next questions.',3,{concept:3,context:2,delegate:2,verify:2,agency:1},'Strong. This is LLM-native work: turn messy language into a structured brief while preserving uncertainty and source evidence.'],['Decide the final customer commitment','Fast, but it crosses into accountability.',1,{concept:1,context:1,delegate:0,verify:0,agency:0},'Tempting, but too much authority. The model can prepare a decision; the accountable owner should make the commitment.'],['Predict the exact part arrival date','That may require supply-chain data and deterministic systems.',1,{concept:1,context:0,delegate:1,verify:1,agency:1},'Possible as a different model problem, but the immediate LLM use is synthesis, not pretending it is the source of truth for availability.']]},
{t:'Which Model?',slide:'Fast models vs reasoning models',concept:'Use fast models for routine work; reasoning models for ambiguity and consequence.',setup:'The evidence conflicts: inventory says one thing, the service ticket says another, and engineering has a possible substitution with regional caveats.',q:'Which model choice fits the task?',best:'Reasoning model',talk:'What kinds of work in your function deserve a reasoning model?',c:[['Reasoning model','Use when evidence conflicts and the answer is consequential.',3,{concept:3,context:2,delegate:2,verify:2,agency:2},'Correct. The value is not just a smoother answer; it is more deliberate comparison under ambiguity.'],['Fast basic model','Great for summaries, rewrites, and low-risk volume.',1,{concept:1,context:1,delegate:1,verify:0,agency:1},'A fast model may produce a polished brief, but it is more likely to underthink conflicts unless the workflow forces verification.'],['Fine-tuned model','Sounds strategic, but premature here.',0,{concept:0,context:0,delegate:0,verify:0,agency:0},'Probably premature. Fine-tuning cannot compensate for unclear sources, missing workflow, or weak evaluation.']]},
{t:'Prompt, Skill, Agent, or Harness?',slide:'Prompts ask, skills repeat, agents act, harnesses govern',concept:'The architecture word matters because each layer solves a different problem.',setup:'A manager writes a repeatable method for summarizing late-repair risk: required inputs, source rules, escalation checks, output format, and examples.',q:'What did the manager create?',best:'A skill',talk:'What playbook in your function should become a reusable skill?',c:[['A skill','A reusable playbook with instructions, examples, and checks.',3,{concept:3,context:2,delegate:2,verify:2,agency:2},'Correct. A skill packages a way to do one job well so it can be reused, improved, and evaluated.'],['A prompt','One request, one output.',1,{concept:1,context:0,delegate:1,verify:0,agency:1},'It started as a prompt, but the examples, rules, and checks make it more durable than a one-off request.'],['An agent','A worker in a loop that can use tools and continue.',1,{concept:1,context:1,delegate:1,verify:1,agency:1},'Not yet. The skill might be used by an agent later, but a playbook is not the worker itself.'],['A harness','Permissions, memory, tools, logs, and approvals.',1,{concept:1,context:1,delegate:1,verify:1,agency:1},'The harness would govern how this skill is used, but the content described here is the skill.']]},
{t:'Context Discipline',slide:'Tokens, context, and memory',concept:'Give the model the smallest useful context, not every document available.',setup:'The team can load ERP extracts, service notes, contracts, PLM records, compliance policies, emails, and data plate history. The context window is large but not free.',q:'What should leaders ask for?',best:'Minimum trusted context',talk:'What sources would be mandatory for this decision, and what would be noise?',c:[['Minimum trusted context','Current availability, contract terms, applicable rule, data plate, and cited notes.',3,{concept:3,context:3,delegate:2,verify:2,agency:2},'Correct. Better context means relevant, current, owned, and cited. Bigger alone can raise cost and confusion.'],['Everything we can connect','Feels thorough, but may dilute signal and raise risk.',1,{concept:1,context:0,delegate:1,verify:1,agency:0},'More context can be useful, but unmanaged context creates stale evidence, conflicting instructions, and avoidable cost.'],['Only the last email thread','Fast, but incomplete.',1,{concept:1,context:1,delegate:1,verify:0,agency:1},'Too narrow. The last email may explain urgency, but it cannot establish availability, commitment terms, or compliance boundaries.']]},
{t:'What to Offload?',slide:'Cognitive outsourcing vs cognitive sovereignty',concept:'Offload burden; preserve judgment.',setup:'The AI can draft the customer note, rank response options, identify missing evidence, and recommend whether to promise a new repair date.',q:'What is the healthiest first delegation?',best:'Prepare options; human commits',talk:'Where would AI make your team thinking stronger rather than replacing it?',c:[['Prepare options; human commits','AI gathers evidence and drafts; accountable owner decides.',3,{concept:3,context:2,delegate:3,verify:2,agency:3},'Correct. This is cognitive sovereignty: the person stays accountable while AI increases the quality and speed of thought.'],['AI sends the update when confidence is high','Fast, but confidence is not accountability.',1,{concept:1,context:1,delegate:1,verify:1,agency:0},'Possibly later in low-risk lanes. For Day 1 concepts, this is the key distinction: confidence scores are not decision rights.'],['AI only summarizes documents','Safe, but lower leverage.',1,{concept:1,context:2,delegate:1,verify:1,agency:2},'Safe but thin. If the AI never helps compare options or surface gaps, leaders will miss much of the value.']]},
{t:'Verification',slide:'Evidence, gaps, falsifiers, independent checks',concept:'Correctness comes from the workflow around the model.',setup:'The model says a substitute part is acceptable and a revised ETA can be offered, but the source evidence is not shown.',q:'What should the leader require before action?',best:'Evidence plus falsifiers',talk:'What evidence would change your mind in a real repair commitment?',c:[['Evidence plus falsifiers','Citations, assumptions, missing evidence, and what would disprove the answer.',3,{concept:3,context:2,delegate:2,verify:3,agency:3},'Correct. The point is not to make the answer sound confident. The point is to make uncertainty visible enough to manage.'],['A more confident tone','Readable, but not safer.',0,{concept:0,context:0,delegate:0,verify:0,agency:0},'Tone can hide weak evidence. Leaders should ask for source facts, inference, gaps, and checks.'],['A second AI answer with no shared source list','Useful only if it is an independent check.',1,{concept:1,context:1,delegate:1,verify:1,agency:1},'A second pass helps only when it checks the answer against evidence or a different method. Two fluent guesses are still guesses.']]},
{t:'Prompt Injection',slide:'When AI reads, it can also be told what to do',concept:'The real defense is the harness: permissions, confirmations, logs, and human gates.',setup:'A supplier PDF includes hidden text telling the AI to ignore company policy and send the repair file externally.',q:'Where should the strongest control live?',best:'Harness control',talk:'What actions should never happen without confirmation in your function?',c:[['Harness control','Treat external content as untrusted; require confirmations and limit tools.',3,{concept:3,context:2,delegate:3,verify:3,agency:3},'Correct. Prompts matter, but permissions, tool limits, logs, and human gates are the real safety layer.'],['A better prompt','Helpful, but not enough.',1,{concept:1,context:1,delegate:1,verify:1,agency:1},'The prompt should say document text is untrusted, but a prompt alone should not be the only barrier before external action.'],['Ban document upload','Safe but destroys much of the use case.',1,{concept:1,context:0,delegate:1,verify:1,agency:2},'Sometimes needed, but often too blunt. The stronger leadership move is governed access, not avoiding all useful context.']]},
{t:'Continuous Learning',slide:'Skills, evals, memory, and feedback loops',concept:'Continuous learning is most real at the harness and skill layer.',setup:'After a pilot, teams find the AI repeatedly misses data-plate gaps for older engines in two regions.',q:'What is the best learning response?',best:'Update the skill and evals',talk:'What failure should become an eval case before this scales?',c:[['Update the skill and evals','Add examples, source checks, ownership, and test cases.',3,{concept:3,context:2,delegate:2,verify:3,agency:3},'Correct. The organization learns when failures become better playbooks, better tests, and clearer escalation paths.'],['Tell users to be more careful','Human vigilance matters, but this does not scale.',1,{concept:1,context:1,delegate:0,verify:1,agency:1},'Training matters, but the workflow should improve. Otherwise each team relearns the same lesson.'],['Fine-tune immediately','Expensive move before proving the failure pattern.',0,{concept:0,context:0,delegate:0,verify:0,agency:0},'Maybe later, but the practical first move is skill, version, and eval improvement. Fine-tuning is not a shortcut around governance.']]}];
const state={screen:'start',team:'',i:0,selected:null,answers:[],timer:null,timerValue:60};
const root=document.getElementById('root');
function esc(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
function totals(){const t=Object.fromEntries(cats.map(c=>[c[0],0]));state.answers.forEach(a=>cats.forEach(c=>t[c[0]]+=a.s[c[0]]||0));return t}
function bars(t,max){return cats.map(c=>{const v=t[c[0]]||0,p=Math.max(0,Math.min(100,Math.round(v/max*100)));return `<div class="barrow"><div><span>${c[1]}</span><span>${v}/${max}</span></div><div class="track"><div class="smallfill" style="width:${p}%"></div></div></div>`}).join('')}
function stopTimer(){if(state.timer){clearInterval(state.timer);state.timer=null}}
function render(){stopTimer();if(state.screen==='start')start();if(state.screen==='play')play();if(state.screen==='results')results()}
function start(){root.innerHTML=`<section class="grid"><div class="panel hero"><p class="eyebrow">Day 1 concept practice</p><h2>AI Pattern Lab</h2><p class="copy">A short team game for reinforcing AI fundamentals. Every table starts from the same repair-parts pressure case, then diagnoses the AI pattern, model choice, context strategy, delegation boundary, and risk control.</p><form id="form"><label for="team">Team name</label><input id="team" maxlength="48" placeholder="Table 3, Supply Chain + Customer, etc."><button class="btn" type="submit">Begin Pattern Lab</button></form></div><aside class="panel"><p class="eyebrow">Learning design</p><div class="rule"><b>Fast rounds</b><span>Each round takes 60 to 90 seconds: read, choose, discuss.</span></div><div class="rule"><b>Same business thread</b><span>Late repair parts, customer commitments, engineering compliance, fragmented data, and human accountability.</span></div><div class="rule"><b>Day 2 bridge</b><span>Day 1 teaches the pieces. Day 2 uses the strategy game to feel the tradeoffs.</span></div></aside></section>`;document.getElementById('form').onsubmit=e=>{e.preventDefault();state.team=document.getElementById('team').value.trim()||'Executive team';state.screen='play';state.i=0;state.selected=null;state.answers=[];render()}}
function play(){const r=rounds[state.i],ch=state.selected==null?null:r.c[state.selected],progress=Math.round(state.i/rounds.length*100),score=state.answers.reduce((s,a)=>s+a.p,0),max=rounds.length*3;root.innerHTML=`<section class="grid"><div class="panel round"><div class="meta"><span>Round ${state.i+1} of ${rounds.length}</span><span>${esc(state.team)}</span></div><div class="progress"><div class="fill" style="width:${progress}%"></div></div><p class="eyebrow" style="margin-top:22px">AI 101: ${esc(r.slide)}</p><h2>${esc(r.t)}</h2><p class="copy">${esc(r.setup)}</p><p class="question">${esc(r.q)}</p>${r.c.map((c,idx)=>{let cls='choice';if(state.selected!==null&&c[0]===r.best)cls+=' correct';if(state.selected===idx&&c[0]!==r.best)cls+=' miss';return `<button class="${cls}" data-choice="${idx}" ${state.selected!==null?'disabled':''}><b>${esc(c[0])}</b><span>${esc(c[1])}</span></button>`}).join('')}</div><aside class="panel">${ch?`<span class="badge">${ch[0]===r.best?'Pattern matched':'Good discussion trap'}</span><h2>${esc(r.best)}</h2><p class="copy">${esc(ch[4])}</p><p class="question">${esc(r.concept)}</p><p class="copy"><b>Table talk:</b> ${esc(r.talk)}</p><div style="display:flex;gap:10px;flex-wrap:wrap;margin:14px 0"><button class="ghost" id="timerBtn">Start 60s talk</button><span class="ghost" id="timerPill">60s</span></div><button class="btn" id="next">${state.i===rounds.length-1?'Show Scorecard':'Next Round'}</button>`:`<span class="badge">Scorecard</span><h2>${score}/${max}</h2><p class="copy">Choose the best answer. This is pattern recognition, not trivia.</p>${bars(totals(),Math.max(1,state.answers.length*3))}`}</aside></section>`;document.querySelectorAll('[data-choice]').forEach(b=>b.onclick=()=>{state.selected=Number(b.dataset.choice);play()});if(document.getElementById('next'))document.getElementById('next').onclick=()=>{state.answers.push({r:r.t,b:r.best,c:ch[0],p:ch[2],s:ch[3]});state.selected=null;if(state.i===rounds.length-1)state.screen='results';else state.i++;render()};if(document.getElementById('timerBtn'))document.getElementById('timerBtn').onclick=startTimer}
function startTimer(){stopTimer();state.timerValue=60;document.getElementById('timerBtn').disabled=true;state.timer=setInterval(()=>{state.timerValue--;const p=document.getElementById('timerPill');if(p)p.textContent=state.timerValue+'s';if(state.timerValue<=0){stopTimer();const b=document.getElementById('timerBtn');if(b)b.disabled=false;if(p)p.textContent='Done'}},1000)}
function profile(p){if(p>=86)return['AI Concept Navigator','Your table consistently matched the right AI pattern to the work. You are ready for Day 2 where these concepts become operating-model tradeoffs.'];if(p>=68)return['Strong Pattern Sense','Your table has the core language. The opportunity is to sharpen context discipline, evidence standards, and delegation boundaries.'];return['Useful Friction','Your table surfaced exactly the confusion Day 1 is designed to resolve. Revisit prompt vs skill vs agent vs harness, then replay the hardest rounds.']}
function summary(total,max,pct,prof,t){return ['AI Pattern Lab','Team: '+state.team,'Score: '+total+'/'+max+' ('+pct+'%)','Profile: '+prof[0],'','Capability dimensions:',...cats.map(c=>'- '+c[1]+': '+(t[c[0]]||0)+'/'+max),'','Round review:',...state.answers.map(a=>'- '+a.r+': chose '+a.c+'; best pattern '+a.b),'','Debrief prompts:','- Which AI terms did we confuse at first?','- Where did we over-delegate or under-delegate?','- What source context was essential?','- What playbook should become a reusable skill?'].join('\n')}
function results(){const total=state.answers.reduce((s,a)=>s+a.p,0),max=rounds.length*3,pct=Math.round(total/max*100),prof=profile(pct),t=totals(),sum=summary(total,max,pct,prof,t);root.innerHTML=`<section class="grid"><div class="panel"><p class="eyebrow">${esc(state.team)} scorecard</p><div class="score">${total}/${max}</div><h2 style="font-size:clamp(32px,5vw,58px);line-height:.95;margin:12px 0">${esc(prof[0])}</h2><p class="copy">${esc(prof[1])}</p><div style="display:flex;gap:10px;flex-wrap:wrap;margin:16px 0"><button class="btn" id="copy">Copy Debrief</button><button class="ghost" id="email">Email Summary</button><button class="ghost" id="again">Run Again</button></div>${bars(t,max)}</div><aside class="panel"><p class="eyebrow">Round review</p>${state.answers.map(a=>`<div class="review"><div><b>${esc(a.r)}</b><br><span style="color:rgba(255,255,255,.66)">Chose ${esc(a.c)}. Best pattern: ${esc(a.b)}.</span></div><div class="dot">${a.p}</div></div>`).join('')}</aside></section><section class="panel" style="margin-top:24px"><p class="eyebrow">Facilitator debrief</p><div class="rule"><b>Concept precision</b><span>Which terms did your table confuse: prompt, skill, agent, harness, RAG, eval, or model?</span></div><div class="rule"><b>Delegation boundary</b><span>Where did you want speed badly enough to over-delegate authority?</span></div><div class="rule"><b>Reusable skill</b><span>What one Cummins playbook should be captured as a skill after this session?</span></div></section>`;document.getElementById('copy').onclick=async()=>{await navigator.clipboard.writeText(sum);document.getElementById('copy').textContent='Copied'};document.getElementById('email').onclick=()=>{location.href='mailto:suzanne.kawamleh@cummins.com?subject='+encodeURIComponent('AI Pattern Lab result - '+state.team)+'&body='+encodeURIComponent(sum)};document.getElementById('again').onclick=()=>{state.screen='start';render()}}
function showShare(){const u=location.href;document.getElementById('link').textContent=u;document.getElementById('qr').innerHTML='<img alt="QR code" src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data='+encodeURIComponent(u)+'">';document.getElementById('share').classList.add('on')}
document.getElementById('shareBtn').onclick=showShare;document.getElementById('close').onclick=()=>document.getElementById('share').classList.remove('on');document.getElementById('copyLink').onclick=async()=>{await navigator.clipboard.writeText(location.href);document.getElementById('copyLink').textContent='Copied'};render();
</script>
</body>
</html>
